<!-- Huvudinnehåll -->
<div>


    <!-- Signup formuläret -->
    <div class="signup-container">
        <h2 class="w3-text-white w3-center w3-large">Signup</h2>
        <form id="signup-form">

            <!-- Email -->
            <div class="input-group">
                <label for="email">Email <span style="color: red">*</span></label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <!-- Lösenord -->
            <div class="input-group">
                <label for="password">Password (min 6 characters) <span style="color: red">*</span></label>
                <input type="password" id="password" name="password" placeholder="Enter your password" minlength="6" required>
            </div>

            <!-- Confirm Lösenord -->
            <div class="input-group">
                <label for="confirm-password">Confirm Password <span style="color: red">*</span></label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
            </div>

            <!-- Terms of Service -->
            <div class="input-group">
                <label for="terms">
                    <input type="checkbox" id="terms" name="terms" required>
                    I agree to the <a href="#" target="_blank">Terms of Service</a>*
                </label>
            </div>

            <!-- Signup knappen -->
            <button type="submit" class="signup-button">Sign Up</button>
        </form>
    </div>
