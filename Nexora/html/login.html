<!-- Titel -->
    <h1 id="1" class="w3-center w3-xxlarge w3-text-white w3-padding-32 w3-opacity w3-black" style="letter-spacing: 4px; border-radius: 8px;">
        Login
    </h1>

  


<!-- Huvudinnehåll -->
<div>


    <!-- Login formuläret -->
    <div class="login-container">
        <h2 class="w3-text-white w3-center w3-large">Login</h2>
        <form id="login-form">

            <!-- Email -->
            <div class="input-group">
                <label for="email">Email <span style="color: red">*</span></label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <!-- Lösenord -->
            <div class="input-group">
                <label for="password">Password <span style="color: red">*</span></label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <!-- Logga in knappen -->
            <button type="submit" class="login-button">Login</button>
        </form>

        <!-- Knapp för att ta dig till signup sidan ifall man inte har konto -->
        <p class="signup-link">Don't have an account? <a href="signup.html">Sign up here</a></p>
    </div>

      </p>
    </div>
